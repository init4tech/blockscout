name: Publish Docker image to ghcr.io/init4tech

on:
  push:
    branches:
      - signet-main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: init4tech/blockscout

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions
        id: version
        run: |
          echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
          # Extract Elixir release version from rel/config.exs
          RELEASE_VERSION=$(grep -oP 'set version: "\K[^"]+' rel/config.exs)
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
          build-args: |
            BLOCKSCOUT_VERSION=signet-${{ steps.version.outputs.short_sha }}
            RELEASE_VERSION=${{ steps.version.outputs.release_version }}

  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions
        id: version
        run: |
          echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
          # Extract Elixir release version from rel/config.exs
          RELEASE_VERSION=$(grep -oP 'set version: "\K[^"]+' rel/config.exs)
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/arm64
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
          build-args: |
            BLOCKSCOUT_VERSION=signet-${{ steps.version.outputs.short_sha }}
            RELEASE_VERSION=${{ steps.version.outputs.release_version }}

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: version
        run: echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        run: |
          # Tag with short SHA and latest
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:signet-${{ steps.version.outputs.short_sha }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:signet-latest" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-amd64.outputs.digest }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-arm64.outputs.digest }}"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
